<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="/connect-suite.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1>Contact us</h1>
        <p class="muted">Send us a message and we will get back to you shortly.</p>

        <form id="contact-form" novalidate>
          <div class="row">
            <label class="field">
              <span>Full name *</span>
              <input id="fullName" name="fullName" autocomplete="name" />
              <span id="fullName-error" class="error-inline"></span>
            </label>
            <label class="field">
              <span>Email</span>
              <input id="email" name="email" type="email" autocomplete="email" />
              <span id="email-error" class="error-inline"></span>
            </label>
          </div>

          <div class="row">
            <label class="field">
              <span>Phone</span>
              <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="+27821234567" />
              <span id="phone-error" class="error-inline"></span>
            </label>
          </div>

          <label class="field">
            <span>Message</span>
            <textarea id="message" name="message"></textarea>
            <span id="message-error" class="error-inline"></span>
          </label>

          <button id="submit-btn" class="btn" type="submit">
            <span id="submit-spinner" class="spinner hidden"></span>
            <span>Submit</span>
          </button>

          <p id="form-message" class="message hidden"></p>
        </form>
      </section>
    </main>

    <script src="/connect-contact.js" defer></script>
  </body>
</html>
