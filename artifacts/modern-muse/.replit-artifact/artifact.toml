kind = "web"
previewPath = "/"
title = "Modern Muse"
version = "1.0.0"
id = "artifacts/modern-muse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19303

[services.development]
run = "pnpm --filter @workspace/modern-muse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/modern-muse", "run", "build" ]
publicDir = "artifacts/modern-muse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19303"
BASE_PATH = "/"
